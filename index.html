  <script>
  const API_KEY = "7890d18ea0eb73d0fd252f2c8a90322a";

  function fetchWeather(lat, lon) {
  fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`)
    .then(res => {
      if (!res.ok) {
        throw new Error("API request failed");
      }
      return res.json();
    })
    .then(data => {
      document.getElementById("temperature").innerText =
        Math.round(data.main.temp) + "°C";

      document.getElementById("condition").innerText =
        data.weather[0].main;

      document.getElementById("location").innerText =
        data.name;
    })
    .catch(err => {
      console.log("Weather Error:", err);
      document.getElementById("condition").innerText = "Weather unavailable";
    });
}

  // Get user location
  if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        fetchWeather(pos.coords.latitude, pos.coords.longitude);
      },
      () => {
        document.getElementById("condition").innerText = "Location denied";
      }
    );
  } else {
    document.getElementById("condition").innerText = "No GPS support";
  }
</script>


<script>

/* ===============================
   MARKET SNAPSHOT MODULE
================================ */

let marketData = {
  crop: "Loading...",
  todayPrice: 0,
  yesterdayPrice: 0,
  unit: "₹/quintal"
};

/* Fetch market data from backend */
function fetchMarketData() {
  fetch("http://localhost:3000/market")
    .then(res => {
      if (!res.ok) {
        throw new Error("Backend not responding");
      }
      return res.json();
    })
    .then(data => {
      marketData.crop = data.crop;
      marketData.todayPrice = data.price;
      marketData.yesterdayPrice = data.yesterday;

      loadHomeModule();   // refresh UI after data arrives
    })
    .catch(err => {
      console.log("Market error:", err);
    });
}

/* Render Market Snapshot */
function loadMarketSnapshot() {
  const change = marketData.todayPrice - marketData.yesterdayPrice;

  let trend = "";
  if (change > 0) {
    trend = "▲ Rising";
  } else if (change < 0) {
    trend = "▼ Falling";
  } else {
    trend = "● Stable";
  }

  return `
    <h4>Market Snapshot</h4>
    <p class="price">${marketData.todayPrice} <span>${marketData.unit}</span></p>
    <p class="crop">${marketData.crop}</p>
    <p class="trend">${trend}</p>
  `;
}

</script>

<script>
/* ===============================
   ENVIRONMENT ALERT MODULE
================================ */

function getEnvironmentAlert(temp, condition) {
  if (condition.includes("Rain")) {
    return "🌧 Heavy rain expected. Avoid pesticide spraying.";
  }
  if (temp > 35) {
    return "🔥 High temperature. Increase irrigation.";
  }
  return "🌱 Weather is suitable for farming activities.";
}

function loadEnvironmentAlert() {
  const temp = document.getElementById("temperature").innerText.replace("°C", "");
  const condition = document.getElementById("condition").innerText;

  return `
    <div class="card">
      <h3>Environment Alert</h3>
      <p>${getEnvironmentAlert(Number(temp), condition)}</p>
    </div>
  `;
}
</script>

<script>
/* ===============================
   ECONOMIC IMPACT MODULE
================================ */

const worldImpact = {
  title: "Fuel Prices Increased",
  impact: "Transport cost may increase. Selling locally is advised."
};

function loadEconomicImpact() {
  return `
    <div class="card">
      <h3>Economy & World Impact</h3>
      <p><strong>${worldImpact.title}</strong></p>
      <p>${worldImpact.impact}</p>
    </div>
  `;
}
</script>


<script>
/* ===============================
   SMART ADVICE MODULE
================================ */

function generateSmartAdvice() {
  const condition = document.getElementById("condition").innerText;

  if (condition.includes("Rain")) {
    return "⏳ Delay harvesting by 2–3 days due to rain.";
  }
  return "✅ Good time for harvesting and selling crops.";
}

function loadSmartAdvice() {
  return `
    <div class="card highlight">
      <h3>Today’s Smart Advice</h3>
      <p>${generateSmartAdvice()}</p>
    </div>
  `;
}
</script>

<script>
/* ===============================
   HOME MODULE CONTROLLER
================================ */

function loadHomeModule() {
  const homeCards = document.getElementById("homeCards");

  homeCards.innerHTML = `
    <div class="home-grid">

      <div class="home-card hero">
        ${loadMarketSnapshot()}
      </div>

      <div class="home-row">
        <div class="home-card">
          ${loadEnvironmentAlert()}
        </div>

        <div class="home-card">
          ${loadEconomicImpact()}
        </div>
      </div>

      <div class="home-card advice">
        ${loadSmartAdvice()}
      </div>

    </div>
  `;
}

window.addEventListener("load", () => {
  fetchMarketData();
});


</script>
