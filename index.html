<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrushiCare</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🔥 Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="videos/farming.mp4" type="video/mp4">
  </video>

  <!-- Dark Overlay (for text readability) -->
  <div class="video-overlay"></div>
  <!-- 🌦 Weather Bar -->
<div class="weather-bar">
  <div class="weather-left">
    <span class="material-icons">cloud</span>
    <div>
      <p class="temp" id="temperature">--°C</p>
      <p class="condition" id="condition">Loading...</p>
    </div>
  </div>

  <div class="weather-right">
    <span class="material-icons">location_on</span>
    <p id="location">Detecting...</p>
  </div>
</div>

  <!-- Main Content -->
 <main class="content">
  <h1 class="app-name">
    <span class="green">Krushi</span><span class="gold">Care</span>
  </h1>
  <p class="tagline">Helping Maharashtra Farmers with Smart Decisions</p>
</main>

<div class="mh-border">
  <svg viewBox="0 0 800 800" class="mh-svg">
    <!-- Accurate Maharashtra outline (simplified but correct shape) -->
    <path class="mh-path"
      d="M140 180 L260 140 L380 150 L480 140 L610 180
         L660 280 L620 360 L650 450 L560 520
         L470 600 L360 620 L260 580 L210 500
         L170 420 L130 340 L150 260 Z" />
  </svg>
</div>

  <!-- Bottom Menu Bar -->
  <nav class="bottom-menu">
    <a href="#" class="menu-item active">
      <span class="material-icons">home</span>
      <small>Home</small>
    </a>

    <a href="#" class="menu-item">
      <span class="material-icons">person</span>
      <small>You</small>
    </a>

    <a href="#" class="menu-item">
      <span class="material-icons">eco</span>
      <small>Environment</small>
    </a>

    <a href="#" class="menu-item">
      <span class="material-icons">currency_rupee</span>
      <small>Economy</small>
    </a>

    <a href="#" class="menu-item">
      <span class="material-icons">settings</span>
      <small>Setting</small>
    </a>
  </nav>

  <!-- Service Worker -->
 
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered', reg))
        .catch(err => console.log('Service Worker failed', err));
    });
  }
</script>

    
  </script>
  <script>
  const API_KEY = "YOUR_API_KEY_HERE";

  function fetchWeather(lat, lon) {
    fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
    )
      .then(res => res.json())
      .then(data => {
        document.getElementById("temperature").innerText =
          Math.round(data.main.temp) + "°C";

        document.getElementById("condition").innerText =
          data.weather[0].main;

        document.getElementById("location").innerText =
          data.name;
      })
      .catch(() => {
        document.getElementById("condition").innerText = "Weather unavailable";
      });
  }

  // Get user location
  if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        fetchWeather(pos.coords.latitude, pos.coords.longitude);
      },
      () => {
        document.getElementById("condition").innerText = "Location denied";
      }
    );
  } else {
    document.getElementById("condition").innerText = "No GPS support";
  }
</script>

</body>
</html>
