<!DOCTYPE html>
<html lang="en">
<head>

if(!localStorage.getItem("onboardingDone")){

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrushiCare</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--  Background Video -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="videos/farming.mp4" type="video/mp4">
  </video>

  <!-- Dark Overlay -->
  <div class="video-overlay"></div>

  <!-- 🌦 Weather Bar -->
  <div class="weather-bar">
    <div class="weather-left">
      <span class="material-icons">cloud</span>
      <div>
        <p class="temp" id="temperature">--°C</p>
        <p class="condition" id="condition">Loading...</p>
      </div>
    </div>

    <div class="weather-right">
      <span class="material-icons">location_on</span>
      <p id="location">Detecting...</p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="content">
    <h1 class="app-name">
      <span class="green">Krushi</span><span class="gold">Care</span>
    </h1>
    <p class="tagline">Helping Maharashtra Farmers with Smart Decisions</p>
  </main>

  <!-- Home Info Cards -->
   
  <section class="home-cards" id="homeCards"></section>
  <!-- Smart Advice Bottom Card -->
 <div id="smartAdviceContainer" class="bottom-advice"></div>
  <!-- Bottom Menu Bar -->
  <nav class="bottom-menu">
    <a href="#" class="menu-item active">
      <span class="material-icons">home</span>
      <small>Home</small>
    </a>

    <a href="./you.html" class="menu-item">
      <span class="material-icons">person</span>
      <small>You</small>
    </a>

    <a href="./enviroment.html" class="menu-item">
      <span class="material-icons">eco</span>
      <small>Environment</small>
    </a>

    <a href="./economy.html" class="menu-item">
      <span class="material-icons">currency_rupee</span>
      <small>Economy</small>
    </a>

    <a href="./setting.html" class="menu-item">
      <span class="material-icons">settings</span>
      <small>Setting</small>
    </a>
  </nav>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker failed', err));
      });
    }
  </script>

  <!-- Weather Script -->
  <script>
    const API_KEY = "7890d18ea0eb73d0fd252f2c8a90322a";

    function fetchWeather(lat, lon) {
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`)
        .then(res => {
          if (!res.ok) throw new Error("API request failed");
          return res.json();
        })
        .then(data => {
          document.getElementById("temperature").innerText =
            Math.round(data.main.temp) + "°C";

          document.getElementById("condition").innerText =
            data.weather[0].main;

          document.getElementById("location").innerText =
            data.name;
        })
        .catch(err => {
          console.log("Weather Error:", err);
          document.getElementById("condition").innerText = "Weather unavailable";
        });
    }

    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          fetchWeather(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
          document.getElementById("condition").innerText = "Location denied";
        }
      );
    } else {
      document.getElementById("condition").innerText = "No GPS support";
    }
  </script>

  <!-- SMART ADVICE ONLY -->
  <script>
/* ===============================
   SMART ADVICE MODULE
================================ */

function generateSmartAdvice() {
  const condition = document.getElementById("condition").innerText;

  if (condition.includes("Rain")) {
    return "⏳ Delay harvesting by 2–3 days due to rain.";
  }
  return "✅ Good time for harvesting and selling crops.";
}

function loadSmartAdvice() {
  const container = document.getElementById("smartAdviceContainer");

  container.innerHTML = `
    <div class="bottom-advice-card">
      <h3>Today’s Smart Advice</h3>
      <p>${generateSmartAdvice()}</p>
    </div>
  `;
}

window.addEventListener("load", () => {
  loadSmartAdvice();
});
</script>
</body>
</html>
