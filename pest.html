<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pest Advisory | KrushiCare</title>

<link rel="stylesheet" href="pest.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>


<body>

<div class="pest-container">

<header class="pest-header">

<button onclick="goBack()" class="back-btn">
<span class="material-icons">arrow_back</span>
</button>

<h2>Pest Advisory</h2>

</header>


<div class="pest-card">

<div class="pest-title">

<span class="material-icons pest-icon">bug_report</span>

<h3 id="pestName">Loading...</h3>

</div>

<p id="pestDesc" class="pest-desc">
Fetching pest information...
</p>


<div class="solution-section">

<h4>
<span class="material-icons">health_and_safety</span>
Recommended Solutions
</h4>

<ul id="pestSolutions"></ul>

</div>

</div>


</div>



<script>

/* DISTRICT → PEST MAP */

const pestDistrictMap = {

"Ahmednagar":"Powdery mildew",
"Akola":"Powdery mildew",
"Amravati":"Grease spot (Pythium blight)",
"Aurangabad":"Powdery mildew",
"Beed":"Grease spot (Pythium blight)",
"Bhandara":"Grease spot (Pythium blight)",
"Buldhana":"Powdery mildew",
"Chandrapur":"Fungi Nuisance",
"Dhule":"Powdery mildew",
"Gadchiroli":"Fungi Nuisance",
"Gondia":"Grease spot (Pythium blight)",
"Hingoli":"Powdery mildew",
"Jalgaon":"Powdery mildew",
"Jalna":"Powdery mildew",
"Kolhapur":"Mushrooms",
"Latur":"Powdery mildew",
"Mumbai City":"Fairy ring",
"Mumbai Suburban":"Fairy ring",
"Nagpur":"Powdery mildew",
"Nanded":"Powdery mildew",
"Nandurbar":"Powdery mildew",
"Nashik":"Powdery mildew",
"Osmanabad":"Powdery mildew",
"Palghar":"Fungi Nuisance",
"Parbhani":"Grease spot (Pythium blight)",
"Pune":"Powdery mildew",
"Raigad":"Fungi Nuisance",
"Ratnagiri":"Mushrooms",
"Sangli":"Powdery mildew",
"Satara":"Powdery mildew",
"Sindhudurg":"Mushrooms",
"Solapur":"Powdery mildew",
"Thane":"Fairy ring",
"Wardha":"Powdery mildew",
"Washim":"Powdery mildew",
"Yavatmal":"Grease spot (Pythium blight)"

};



/* LOAD PEST DATA */
async function loadPestInfo(){

try{

const profile = JSON.parse(localStorage.getItem("farmerProfile")) || {}

const district = (profile.district || "").toLowerCase()

/* find district key ignoring case */

const districtKey = Object.keys(pestDistrictMap).find(
d => d.toLowerCase() === district
)

if(!districtKey){

document.getElementById("pestName").innerText="No pest data for this district"
return

}

const pestName = pestDistrictMap[districtKey]


/* fetch pest database */

const response = await fetch("./data/krushicare_pests_database.json")

const data = await response.json()

const pest = data[pestName]


document.getElementById("pestName").innerText = pestName

document.getElementById("pestDesc").innerText = pest.description


const list = document.getElementById("pestSolutions")

list.innerHTML=""

pest.solutions.forEach(sol=>{

const li=document.createElement("li")

li.innerText=sol

list.appendChild(li)

})

}

catch(err){

console.log(err)

document.getElementById("pestDesc").innerText="Error loading pest data"

}

}

loadPestInfo()



/* Back button */

function goBack(){

window.location.href="enviroment.html"

}

/* Back button */

function goBack(){

window.location.href = "enviroment.html";

}

</script>


</body>

</html>
